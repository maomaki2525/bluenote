<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueNote</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>BlueNote</h1>
      <p>公開掲示板（仮）</p>
    </div>
  </div>

  <nav class="nav">
    <a href="#">新規投稿</a>
    <a href="#">最新</a>
    <a href="#">人気</a>
    <a href="#">ヘルプ</a>
  </nav>
</header>

<main class="wrap">

<section class="card">
<h2>新規投稿</h2>

<form class="form">

<label>
名前
<input class="nameInput" type="text" placeholder="名無しさん" maxlength="20" />
</label>

<label>
本文
<textarea class="textInput" rows="4" placeholder="ここに書き込み…（最大200文字）" maxlength="200"></textarea>
</label>

<div class="formRow">
<button class="submitBtn" type="button">投稿する</button>
<span class="hint">※ まだサーバー保存されません（デザイン確認中）</span>
</div>

</form>
</section>

<section class="card">

<div class="cardHead">
<h2>投稿一覧</h2>
<div class="pill">Online</div>
</div>

<ul class="posts postList">

<li class="post">
<div class="postMeta">
<span class="id">#1</span>
<span class="name">名無しさん</span>
<span class="time">2026-03-04 10:29</span>
</div>
<p class="postText">はじめての書き込み！掲示板メイン作成中〜！</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#2</span>
<span class="name">まお</span>
<span class="time">2026-03-04 10:31</span>
</div>
<p class="postText">青系で量産っぽい雰囲気にした！</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#3</span>
<span class="name">管理人</span>
<span class="time">2026-03-04 10:33</span>
</div>
<p class="postText">次はKotlinでこの一覧を動的にするよ！</p>
</li>

</ul>

</section>

<footer class="foot">
<small>BlueNote • prototype</small>
</footer>

</main>


<script>
// =========================================
// BlueNote : localStorage版（投稿が消えない）
// =========================================

const STORAGE_KEY = "BlueNote_posts";
const postListEl = document.querySelector(".postList");

let postId = 4;

// 保存データ読み込み
function loadPosts() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];

  try {
    return JSON.parse(raw);
  } catch {
    return [];
  }
}

// 保存
function savePosts(posts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

// HTML生成
function postToHTML(p) {
  return `
  <li class="post">
    <div class="postMeta">
      <span class="id">#${p.id}</span>
      <span class="name">${escapeHTML(p.name)}</span>
      <span class="time">${p.time}</span>
    </div>
    <p class="postText">${escapeHTML(p.text)}</p>
  </li>`;
}

// XSS対策
function escapeHTML(s) {
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// 描画
function render() {
  const posts = loadPosts();
  postListEl.innerHTML = "";

  for (const p of posts) {
    postListEl.innerHTML += postToHTML(p);
  }

  const maxId = posts.reduce((m,p)=>Math.max(m,p.id),3);
  postId = maxId + 1;
}

// 投稿処理
document.querySelector(".submitBtn").onclick = function(){

  const nameInput = document.querySelector(".nameInput");
  const textInput = document.querySelector(".textInput");

  let name = nameInput.value.trim();
  let text = textInput.value.trim();

  if(name==="") name="名無しさん";
  if(text==="") return;

  const newPost = {
    id: postId,
    name: name,
    text: text,
    time: new Date().toLocaleString()
  };

  const posts = loadPosts();
  posts.push(newPost);

  savePosts(posts);
  render();

  textInput.value="";
};

render();
</script>

</body>
</html>
