<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>swadyBBS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>swadyBBS</h1>
      <p>公開掲示板（仮）</p>
    </div>
  </div>

  <nav class="nav">
    <a href="#">新規投稿</a>
    <a href="#">最新</a>
    <a href="#">人気</a>
    <a href="#">ヘルプ</a>
  </nav>
</header>

<main class="wrap">

<section class="card">
<h2>新規投稿</h2>

<form class="form">

<label>
名前
<input class="nameInput" type="text" placeholder="名無しさん" maxlength="20" />
</label>

<label>
本文
<textarea class="textInput" rows="4" placeholder="ここに書き込み…（最大200文字）" maxlength="200"></textarea>
</label>

<div class="formRow">
<button class="submitBtn" type="button">投稿する</button>
<span class="hint">※ まだ保存されません（デザイン確認中）</span>
</div>

</form>
</section>

<section class="card">

<div class="cardHead">
<h2>投稿一覧</h2>
<div class="pill">Online</div>
</div>

<ul class="posts postList">

<li class="post">
<div class="postMeta">
<span class="id">#1</span>
<span class="name">名無しさん</span>
<span class="time">2026-03-04 10:29</span>
</div>
<p class="postText">はじめての書き込み！掲示板デザイン作成中〜！</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#2</span>
<span class="name">まお</span>
<span class="time">2026-03-04 10:31</span>
</div>
<p class="postText">青系で量産っぽい雰囲気にしたい💙</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#3</span>
<span class="name">管理人</span>
<span class="time">2026-03-04 10:33</span>
</div>
<p class="postText">次はKotlinでこの一覧を動的にするよ！</p>
</li>

</ul>

</section>

<footer class="foot">
<small>swadyBBS • prototype</small>
</footer>

</main>


<script>
    // =========================================
    // swadyBBS : localStorage版（投稿が消えない）
    // =========================================
  
    // // 保存に使う「キー（名前）」を決める
    // // localStorageは「名前:中身」で保存するから、名前を固定しとく
    const STORAGE_KEY = "swadyBBS_posts";
  
    // // 画面の投稿一覧（ul）を取ってくる
    const postListEl = document.querySelector(".postList");
  
    // // 投稿ID（番号）。あとで「保存データの最大ID+1」に合わせる
    let postId = 4;
  
    // -----------------------------------------
    // // 1) 保存データを読み込む関数
    // -----------------------------------------
    function loadPosts() {
      // // localStorageから文字列で取ってくる（無いときは null）
      const raw = localStorage.getItem(STORAGE_KEY);
  
      // // まだ何も保存されてないなら空配列
      if (!raw) return [];
  
      // // JSON文字列 → 配列に戻す
      // // もし壊れてたら空にする（エラー防止）
      try {
        return JSON.parse(raw);
      } catch {
        return [];
      }
    }
  
    // -----------------------------------------
    // // 2) 投稿配列を保存する関数
    // -----------------------------------------
    function savePosts(posts) {
      // // 配列 → JSON文字列にして保存
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }
  
    // -----------------------------------------
    // // 3) 投稿1件をHTMLにする関数
    // -----------------------------------------
    function postToHTML(p) {
      return `
        <li class="post">
          <div class="postMeta">
            <span class="id">#${p.id}</span>
            <span class="name">${escapeHTML(p.name)}</span>
            <span class="time">${p.time}</span>
          </div>
          <p class="postText">${escapeHTML(p.text)}</p>
        </li>
      `;
    }
  
    // -----------------------------------------
    // // 4) XSS対策：入力をそのままHTMLに入れない
    // //    "<" とかが入るとタグ扱いになって崩れる/危険なので文字に変える
    // -----------------------------------------
    function escapeHTML(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  
    // -----------------------------------------
    // // 5) 画面を「保存データ」で描き直す関数
    // -----------------------------------------
    function render() {
      const posts = loadPosts();
  
      // // いったん一覧を空にする（毎回全部描き直す）
      postListEl.innerHTML = "";
  
      // // 保存データを順番にHTML化して追加
      for (const p of posts) {
        postListEl.innerHTML += postToHTML(p);
      }
  
      // // postIdを「最大ID+1」に合わせる
      // // 例：最大が10なら次は11
      const maxId = posts.reduce((m, p) => Math.max(m, p.id), 3);
      postId = maxId + 1;
    }
  
    // -----------------------------------------
    // // 6) 投稿ボタン処理
    // -----------------------------------------
    document.querySelector(".submitBtn").onclick = function () {
      const nameInput = document.querySelector(".nameInput");
      const textInput = document.querySelector(".textInput");
  
      let name = nameInput.value.trim();
      let text = textInput.value.trim();
  
      // // 名前空なら名無しさん
      if (name === "") name = "名無しさん";
  
      // // 本文空なら何もしない
      if (text === "") return;
  
      // // 新しい投稿データ（オブジェクト）を作る
      const newPost = {
        id: postId,
        name: name,
        text: text,
        time: new Date().toLocaleString()
      };
  
      // // いまの保存データを読み込んで、末尾に追加
      const posts = loadPosts();
      posts.push(newPost);
  
      // // 保存
      savePosts(posts);
  
      // // 画面も更新（保存データから再描画）
      render();
  
      // // 本文欄だけ消す（連投しやすい）
      textInput.value = "";
    };
  
    // -----------------------------------------
    // // 7) ページを開いたときに最初に描画
    // -----------------------------------------
    render();
  </script>

</body>
</html>
