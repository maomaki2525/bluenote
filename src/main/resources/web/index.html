<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueNote</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>BlueNote</h1>
      <p>公開掲示板（仮）</p>
    </div>
  </div>

  <nav class="nav">
    <a href="#">新規投稿</a>
    <a href="#">最新</a>
    <a href="#">人気</a>
    <a href="#">ヘルプ</a>
  </nav>
</header>

<main class="wrap">

<section class="card">
  <h2>新規投稿</h2>

  <form class="form" onsubmit="return false;">
    <label>
      名前
      <input class="nameInput" type="text" placeholder="名無しさん" maxlength="20" />
    </label>

    <label>
      本文
      <textarea class="textInput" rows="4" placeholder="ここに書き込み…（最大200文字）" maxlength="200"></textarea>
    </label>

    <div class="formRow">
      <button class="submitBtn" type="button">投稿する</button>
      <span class="hint">※ 投稿はサーバーに保存され、みんなに見えます</span>
    </div>
  </form>
</section>

<section class="card">
  <div class="cardHead">
    <h2>投稿一覧</h2>
    <div class="pill">Online</div>
  </div>

  <ul class="posts postList"></ul>
</section>

<footer class="foot">
  <small>BlueNote • prototype</small>
</footer>

</main>

<script>
  const postListEl = document.querySelector(".postList");

  // HTML生成
  function postToHTML(p) {
    return `
      <li class="post">
        <div class="postMeta">
          <span class="id">#${p.id}</span>
          <span class="name">${escapeHTML(p.name)}</span>
          <span class="time">${escapeHTML(p.time)}</span>
        </div>
        <p class="postText">${escapeHTML(p.text)}</p>
      </li>
    `;
  }

  // XSS対策
  function escapeHTML(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // 使うスレッドIDを確保（無ければ自動作成）
  async function getDefaultThreadId() {
    // 1) スレ一覧取得
    const res = await fetch("/api/threads");
    if (!res.ok) throw new Error("threads fetch failed: " + res.status);
    let threads = await res.json();

    // 2) 無ければ作る（Kotlin側は text/plain でタイトル受け取り）
    if (!Array.isArray(threads) || threads.length === 0) {
      const createRes = await fetch("/api/threads", {
        method: "POST",
        headers: { "Content-Type": "text/plain; charset=utf-8" },
        body: "BlueNote"
      });
      if (!createRes.ok) throw new Error("thread create failed: " + createRes.status);

      // 作成後もう一回一覧
      const res2 = await fetch("/api/threads");
      threads = await res2.json();
    }

    // 一番新しいやつ（サーバー側が降順で返してるので先頭でOK）
    return threads[0].id;
  }

  // 投稿一覧描画（サーバーから取得）
  async function render() {
    try {
      const threadId = await getDefaultThreadId();
      const res = await fetch(`/api/posts?threadId=${encodeURIComponent(threadId)}`);
      if (!res.ok) throw new Error("posts fetch failed: " + res.status);

      const posts = await res.json();
      postListEl.innerHTML = "";

      for (const p of posts) {
        postListEl.innerHTML += postToHTML(p);
      }
    } catch (e) {
      postListEl.innerHTML = `<li class="post"><p class="postText">読み込みエラー：${escapeHTML(e.message)}</p></li>`;
      console.error(e);
    }
  }

  // 投稿処理（Kotlin側の仕様に合わせて x-www-form-urlencoded で送る）
  document.querySelector(".submitBtn").onclick = async function () {
    const nameInput = document.querySelector(".nameInput");
    const textInput = document.querySelector(".textInput");

    let name = nameInput.value.trim();
    let text = textInput.value.trim();

    if (name === "") name = "名無しさん";
    if (text === "") return;

    try {
      const threadId = await getDefaultThreadId();

      const body = new URLSearchParams();
      body.set("threadId", String(threadId));
      body.set("name", name);
      body.set("text", text);

      const res = await fetch("/api/posts", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8" },
        body
      });

      if (!res.ok) {
        const msg = await res.text().catch(() => "");
        throw new Error(`投稿失敗: ${res.status} ${msg}`);
      }

      textInput.value = "";
      await render();
    } catch (e) {
      console.error(e);
      alert(e.message);
    }
  };

  // 初回描画
  render();
</script>

</body>
</html>
