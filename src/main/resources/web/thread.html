<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>swadyBBS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>swadyBBS</h1>
      <p>公開掲示板（仮）</p>
    </div>
  </div>

  <nav class="nav">
    <a href="#">新規投稿</a>
    <a href="#">最新</a>
    <a href="#">人気</a>
    <a href="#">ヘルプ</a>
  </nav>
</header>

<main class="wrap">

<section class="card">
<h2>新規投稿</h2>

<form class="form">

<label>
名前
<input class="nameInput" type="text" placeholder="名無しさん" maxlength="20" />
</label>

<label>
本文
<textarea class="textInput" rows="4" placeholder="ここに書き込み…（最大200文字）" maxlength="200"></textarea>
</label>

<div class="formRow">
<button class="submitBtn" type="button">投稿する</button>
<span class="hint">※ まだ保存されません（デザイン確認中）</span>
</div>

</form>
</section>

<section class="card">

<div class="cardHead">
<h2>投稿一覧</h2>
<div class="pill">Online</div>
</div>

<ul class="posts postList">

<li class="post">
<div class="postMeta">
<span class="id">#1</span>
<span class="name">名無しさん</span>
<span class="time">2026-03-04 10:29</span>
</div>
<p class="postText">はじめての書き込み！掲示板デザイン作成中〜！</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#2</span>
<span class="name">まお</span>
<span class="time">2026-03-04 10:31</span>
</div>
<p class="postText">青系で量産っぽい雰囲気にしたい💙</p>
</li>

<li class="post">
<div class="postMeta">
<span class="id">#3</span>
<span class="name">管理人</span>
<span class="time">2026-03-04 10:33</span>
</div>
<p class="postText">次はKotlinでこの一覧を動的にするよ！</p>
</li>

</ul>

</section>

<footer class="foot">
<small>swadyBBS • prototype</small>
</footer>

</main>

<script>
  const params = new URLSearchParams(location.search);
  const threadIdStr = params.get("id");
  const threadId = Number(threadIdStr);

  // ✅ idチェック（ないときは止める）
  if (!threadIdStr || Number.isNaN(threadId)) {
    alert("スレIDがありません！URLの ?id= を確認してね（例: /thread?id=4）");
    throw new Error("threadId missing");
  }

  const postListEl = document.querySelector(".postList");

  function escapeHTML(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function postToHTML(p){
    return `
<li class="post">
  <div class="postMeta">
    <span class="id">#${p.id}</span>
    <span class="name">${escapeHTML(p.name)}</span>
    <span class="time">${p.time}</span>
  </div>
  <p class="postText">${escapeHTML(p.text)}</p>
</li>`;
  }

  async function render(){
    const res = await fetch(`/api/posts?threadId=${encodeURIComponent(threadId)}`);
    if (!res.ok) {
      postListEl.innerHTML = `<li class="post"><p class="postText">読み込み失敗: ${escapeHTML(await res.text())}</p></li>`;
      return;
    }
    const posts = await res.json();
    postListEl.innerHTML = posts.map(postToHTML).join("");
  }

  document.querySelector(".submitBtn").onclick = async () => {
    const nameInput = document.querySelector(".nameInput");
    const textInput = document.querySelector(".textInput");

    let name = nameInput.value.trim();
    let text = textInput.value.trim();

    if (name === "") name = "名無しさん";
    if (text === "") return;

    const body = new URLSearchParams();
    body.set("threadId", String(threadId));
    body.set("name", name);
    body.set("text", text);

    const res = await fetch("/api/posts", {
      method: "POST",
      headers: {
        // ✅ 文字化け防止
        "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
      },
      body
    });

    // ✅ 失敗したら理由を表示
    if (!res.ok) {
      alert(await res.text());
      return;
    }

    textInput.value = "";
    await render(); // ✅ 反映待つ
  };

  render();
</script>

</body>
</html>
