<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueNote - スレ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>BlueNote</h1>
      <p>スレ</p>
    </div>
  </div>

  <nav class="nav">
    <a href="/threads">スレ一覧</a>
  </nav>
</header>

<main class="wrap">

<section class="card">
  <h2>新規投稿</h2>

  <form class="form" onsubmit="return false;">
    <label>
      名前
      <input class="nameInput" id="name" type="text" placeholder="名無しさん" maxlength="20" />
    </label>

    <label>
      本文
      <textarea class="textInput" id="text" rows="4" placeholder="ここに書き込み…（最大200文字）" maxlength="200"></textarea>
    </label>

    <div class="formRow">
      <button class="submitBtn" id="post" type="button">投稿する</button>
      <span class="hint">※ サーバーに保存</span>
    </div>
  </form>
</section>

<section class="card">
  <div class="cardHead">
    <h2>投稿一覧</h2>
    <div class="pill">Online</div>
  </div>

  <ul class="posts" id="list"></ul>
</section>

<footer class="foot">
  <small>BlueNote • thread</small>
</footer>

</main>

<script>
const params = new URLSearchParams(location.search);
const threadId = Number(params.get("id"));

if (!threadId) {
  alert("スレIDがありません。URLの ?id= を確認してね（例: /thread?id=4）");
}

async function loadPosts() {
  const res = await fetch(`/api/posts?threadId=${threadId}`);
  const list = await res.json();
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  for (const p of list) {
    const li = document.createElement("li");
    li.className = "post";
    li.innerHTML = `
      <div class="postMeta">
        <span class="id">#${p.id}</span>
        <span class="name">${escapeHTML(p.name)}</span>
        <span class="time">${escapeHTML(p.time)}</span>
      </div>
      <p class="postText">${escapeHTML(p.text)}</p>
    `;
    ul.appendChild(li);
  }
}

function escapeHTML(s) {
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.getElementById("post").onclick = async () => {
  if (!threadId) return;

  const nameEl = document.getElementById("name");
  const textEl = document.getElementById("text");

  const name = (nameEl.value.trim() || "名無しさん").slice(0, 20);
  const text = textEl.value.trim().slice(0, 200);

  if (!text) return;

  const body = new URLSearchParams();
  body.set("threadId", String(threadId));
  body.set("name", name);
  body.set("text", text);

  const res = await fetch("/api/posts", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded; charset=utf-8" },
    body
  });

  if (!res.ok) {
    const msg = await res.text().catch(()=>"(no message)");
    alert(`投稿失敗\nstatus=${res.status}\n${msg}`);
    return;
  }

  textEl.value = "";
  await loadPosts();
};

loadPosts();
</script>
</body>
</html>
