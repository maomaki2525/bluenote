<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlueNote - 繧ｹ繝ｬ荳隕ｧ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="logo">s</div>
    <div class="title">
      <h1>BlueNote</h1>
      <p>繧ｹ繝ｬ荳隕ｧ</p>
    </div>
  </div>

  <nav class="nav">
    <a href="/">繧ｹ繝ｬ荳隕ｧ</a>
  </nav>
</header>

<main class="wrap">
  <section class="card">
    <h2>譁ｰ隕上せ繝ｬ菴懈・</h2>

    <div class="formRow" style="gap:10px;">
      <input id="title" class="nameInput" type="text" placeholder="繧ｹ繝ｬ繧ｿ繧､・域怙螟ｧ40譁・ｭ暦ｼ・ maxlength="40" style="flex:1;" />
      <button id="create" class="submitBtn" type="button">菴懈・</button>
    </div>

    <p class="hint">窶ｻ 繧ｵ繝ｼ繝舌・縺ｫ菫晏ｭ假ｼ亥・襍ｷ蜍輔☆繧九→豸医∴繧九・縺ｯ谺｡縺ｧ逶ｴ縺呻ｼ・/p>
  </section>

  <section class="card">
    <div class="cardHead">
      <h2>繧ｹ繝ｬ荳隕ｧ</h2>
      <div class="pill">Online</div>
    </div>

    <ul id="threads" class="posts"></ul>
  </section>

  <footer class="foot">
    <small>BlueNote 窶｢ threads</small>
  </footer>
</main>

<script>
  async function loadThreads() {
    const res = await fetch("/api/threads");
    const list = await res.json();
    const ul = document.getElementById("threads");
    ul.innerHTML = "";
    for (const t of list) {
      const li = document.createElement("li");
      li.className = "post";
      li.innerHTML = `
        <div class="postMeta">
          <span class="id">#${t.id}</span>
          <span class="name">${t.title}</span>
          <span class="time">${t.createdAt}</span>
        </div>
        <p class="postText"><a href="/thread?id=${t.id}">縺薙・繧ｹ繝ｬ繧帝幕縺・/a></p>
      `;
      ul.appendChild(li);
    }
  }
  
  document.getElementById("create").onclick = async () => {
  const titleEl = document.getElementById("title");
  const title = titleEl.value.trim();
  if (!title) return;

  const res = await fetch("/api/threads", {
    method: "POST",
    headers: { "Content-Type": "text/plain; charset=utf-8" },
    body: title
  });

  if (!res.ok) {
    const msg = await res.text().catch(() => "");
    alert(`菴懈・螟ｱ謨予nstatus=${res.status}\n${msg}`);
    return;
  }

  titleEl.value = "";
  await loadThreads();
};
  loadThreads();
  </script>

</body>
</html>
